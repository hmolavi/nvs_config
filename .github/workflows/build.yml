name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3]
    steps:
      - uses: actions/checkout@v4
      - name: Build test project
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd test
          idf.py set-target ${{ matrix.target }}
          idf.py build

  build-examples:
    name: Example ${{ matrix.example }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    strategy:
      fail-fast: false
      matrix:
        example: [basic_usage, array_example, stress_test]
        target: [esp32, esp32s3]
    steps:
      - uses: actions/checkout@v4
      - name: Build example
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd examples/${{ matrix.example }}
          idf.py set-target ${{ matrix.target }}
          idf.py build

  qemu-test:
    name: QEMU test (esp32)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU
        run: |
          apt-get update -qq && apt-get install -y -qq qemu-system-xtensa >/dev/null 2>&1 || true
      - name: Build for QEMU
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd test
          idf.py set-target esp32
          idf.py build
      - name: Run on QEMU
        shell: bash
        run: |
          cd test
          if command -v qemu-system-xtensa &> /dev/null; then
            # Merge flash binary for QEMU
            . $IDF_PATH/export.sh
            esptool.py --chip esp32 merge_bin -o build/merged.bin \
              --flash_mode dio --flash_size 4MB \
              0x1000 build/bootloader/bootloader.bin \
              0x8000 build/partition_table/partition-table.bin \
              0x10000 build/nvs_config_test.bin

            timeout 60 qemu-system-xtensa \
              -nographic -machine esp32 \
              -drive file=build/merged.bin,if=mtd,format=raw \
              2>&1 | tee qemu_output.txt || true

            if grep -q "ALL TESTS PASSED" qemu_output.txt; then
              echo "QEMU tests passed!"
            else
              echo "::warning::QEMU test output did not contain ALL TESTS PASSED"
              cat qemu_output.txt
            fi
          else
            echo "::warning::qemu-system-xtensa not available, skipping QEMU test"
          fi
