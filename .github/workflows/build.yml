name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Unit tests (host, no hardware required) ──────────────────────────────
  unit-tests:
    name: Unit Tests (CppUTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake cpputest lcov

      - name: Build
        run: cmake -B tests/unit/build tests/unit && cmake --build tests/unit/build

      - name: Run tests
        run: ./tests/unit/build/unit_tests -ojunit

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "*.xml"

  # ── Hardware test build check (ESP-IDF, no flash) ────────────────────────
  build-hardware-tests:
    name: Hardware Tests Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    strategy:
      fail-fast: false
      matrix:
        target: [esp32s3]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd tests/hardware
          idf.py set-target ${{ matrix.target }}
          idf.py build

  # ── Example builds ───────────────────────────────────────────────────────
  build-examples:
    name: Example ${{ matrix.example }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    strategy:
      fail-fast: false
      matrix:
        example: [basic_usage, array_example, stress_test]
        target: [esp32, esp32s3]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd examples/${{ matrix.example }}
          idf.py set-target ${{ matrix.target }}
          idf.py build
